<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژانەی مسوڵمان - کاتەکانی بانگ</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fffbf2; --border-color: #d4af37; --highlight-color: #27ae60; --text-color: #2c3e50; }
        body { font-family: 'Amiri', serif; background-color: #f8f9fa; margin: 0; padding: 20px; text-align: center; }
        
        .container { max-width: 600px; margin: 0 auto; background: var(--bg-color); border: 2px solid var(--border-color); border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header { background: var(--border-color); color: white; padding: 15px; position: relative; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .back-btn { position: absolute; left: 15px; top: 15px; background: white; color: var(--border-color); text-decoration: none; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }

        /* Controls Area */
        .settings-box { background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 10px; width: 90%; display: flex; flex-direction: column; gap: 10px; }
        
        select.custom-select { padding: 8px; border-radius: 20px; border: none; font-family: 'Amiri'; font-size: 14px; cursor: pointer; outline: none; background: white; color: var(--text-color); width: 100%; text-align: center; }
        
        .audio-controls { display: flex; align-items: center; justify-content: space-between; gap: 5px; background: white; padding: 5px 10px; border-radius: 20px; flex-wrap: wrap; }
        
        /* Volume Slider */
        input[type=range] { width: 80px; cursor: pointer; }
        
        /* Mute Button */
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; }

        optgroup { font-weight: bold; color: var(--border-color); }

        .section { padding: 20px; border-bottom: 1px solid #eee; }
        .prayer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .prayer-card { background: white; padding: 12px; border-radius: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .prayer-card.active-prayer { border: 2px solid var(--highlight-color); background-color: #e8f8f5; transform: scale(1.02); box-shadow: 0 0 10px rgba(39, 174, 96, 0.2); }
        
        .prayer-name { font-weight: bold; color: var(--text-color); }
        .prayer-time { color: var(--border-color); font-weight: bold; background: #fffbf2; padding: 3px 8px; border-radius: 5px; direction: ltr; }

        #adhan-alert { display: none; background-color: var(--highlight-color); color: white; padding: 15px; margin: 10px; border-radius: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        
        .audio-permission { background: #ffeaa7; padding: 10px; font-size: 12px; color: #d35400; border-bottom: 1px solid #fdcb6e; display: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <audio id="adhan-audio" preload="auto">
            <source src="" type="audio/mpeg">
        </audio>

        <div class="audio-permission" id="audio-perm-btn" onclick="enableAudio()">
            🔊 تکایە ئێرە دابگرە بۆ چالاککردنی دەنگی بانگ (پێویستە)
        </div>

        <div class="header">
            <a href="index.html" class="back-btn">↪</a>
            <span style="font-size:20px; font-weight:bold;">کاتەکانی بانگ</span>
            
            <div class="settings-box">
                <select id="city-select" class="custom-select" onchange="changeCity()">
                    <optgroup label="شارە گەورەکان">
                        <option value="Sulaymaniyah">سلێمانی</option>
                        <option value="Erbil">هەولێر</option>
                        <option value="Duhok">دهۆک</option>
                        <option value="Kirkuk">کەرکوک</option>
                        <option value="Halabja">هەڵەبجە</option>
                        <option value="Baghdad">بەغداد</option>
                    </optgroup>
                    <optgroup label="قەزا و ناحیەکان">
                        <option value="Zakho">زاخۆ</option>
                        <option value="Soran">سۆران</option>
                        <option value="Kalar">کەلار</option>
                        <option value="Ranya">ڕانیە</option>
                        <option value="Chamchamal">چەمچەماڵ</option>
                        <option value="Koya">کۆیە</option>
                        <option value="Akre">ئاکرێ</option>
                        <option value="Darbandikhan">دەربەندیخان</option>
                        <option value="Penjwen">پێنجوێن</option>
                        <option value="Qaladze">قەڵادزێ</option>
                        <option value="Khanaqin">خانەقین</option>
                        <option value="Dukan">دوکان</option>
                        <option value="Rawanduz">ڕەواندز</option>
                        <option value="Shaqlawa">شەقڵاوە</option>
                        <option value="Amadiya">ئامێدی</option>
                    </optgroup>
                </select>

                <div class="audio-controls">
                    <select id="audio-select" onchange="changeAdhanSound()" style="border:none; outline:none; font-family:'Amiri'; width:90px; font-size:12px;">
                        <option value="makkah">بانگی مەککە</option>
                        <option value="madina">بانگی مەدینە</option>
                        <option value="aqsa">بانگی قودس</option>
                        <option value="mishary">مشاری العفاسی</option>
                        <option value="abdulbasit">عبدالباسط</option>
                    </select>

                    <select id="format-select" onchange="changeTimeFormat()" style="border:none; outline:none; font-family:'Amiri'; width:60px; font-size:12px; font-weight:bold;">
                        <option value="24">24H</option>
                        <option value="12">12H</option>
                    </select>
                    
                    <input type="range" id="volume-control" min="0" max="1" step="0.1" value="1" onchange="changeVolume()" title="دەنگ">
                    
                    <button id="mute-btn" class="icon-btn" onclick="toggleMute()" title="بێدەنگ/نۆتیفیکەیشن">🔔</button>
                </div>
            </div>
        </div>

        <div id="adhan-alert">
            🕌 الله أكبر! کاتی بانگی <span id="current-prayer-name">...</span>
        </div>

        <div class="section">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span id="gregorian-date">...</span>
                <span id="hijri-date" style="color:var(--border-color);">...</span>
            </div>
            
            <div id="prayer-container" class="prayer-grid">
                <div style="color:#888;">جاری هێنانە...</div>
            </div>
        </div>

        <div class="section" style="border:none; font-size:12px; color:#999;">
            تێبینی: بۆ بیستنی بانگ، تکایە ئەم پەڕەیە دامەخە (دەتوانیت بچیتە بەرنامەی تر).
        </div>
    </div>

    <script>
        // ==========================================
        // 1. Audio Sources & Setup
        // ==========================================
        const adhanSounds = {
            'makkah': 'https://www.islamcan.com/audio/adhan/azan2.mp3',
            'madina': 'https://www.islamcan.com/audio/adhan/azan3.mp3',
            'aqsa': 'https://www.islamcan.com/audio/adhan/azan6.mp3',
            'mishary': 'https://www.islamcan.com/audio/adhan/azan1.mp3',
            'abdulbasit': 'https://www.islamcan.com/audio/adhan/azan10.mp3'
        };

        const audioPlayer = document.getElementById('adhan-audio');
        let isMuted = false;
        let audioEnabled = false;

        // Restore Settings
        let currentCity = localStorage.getItem('selectedCity') || "Sulaymaniyah";
        let currentLat = localStorage.getItem('userLat') || null;
        let currentLng = localStorage.getItem('userLng') || null;
        let currentSound = localStorage.getItem('selectedSound') || "makkah";
        let savedVolume = localStorage.getItem('adhanVolume') || 1;
        let timeFormat = localStorage.getItem('timeFormat') || '24';

        // Initial UI Setup
        document.getElementById('city-select').value = currentCity;
        document.getElementById('audio-select').value = currentSound;
        document.getElementById('volume-control').value = savedVolume;
        document.getElementById('format-select').value = timeFormat;
        
        audioPlayer.src = adhanSounds[currentSound];
        audioPlayer.volume = savedVolume;

        // ==========================================
        // Service Worker Registration
        // ==========================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Service Worker registered:', reg.scope);
            }).catch(err => console.log('SW registration failed:', err));

            // Listen for messages from Service Worker (background adhan trigger)
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data && event.data.type === 'PLAY_ADHAN') {
                    triggerAdhan(event.data.prayerKey, true); // true = from background
                }
            });
        }

        function sendPrayersToSW(prayers) {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'SCHEDULE_ADHAN',
                    prayers: prayers,
                    sound: currentSound,
                    volume: savedVolume,
                    city: currentCity
                });
            }
        }

        // ==========================================
        // Geolocation - Auto-detect user location
        // ==========================================
        function detectLocation() {
            if (!navigator.geolocation) return;

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude.toFixed(4);
                    const lng = pos.coords.longitude.toFixed(4);

                    // Only update if meaningfully different from saved
                    if (lat !== currentLat || lng !== currentLng) {
                        currentLat = lat;
                        currentLng = lng;
                        localStorage.setItem('userLat', lat);
                        localStorage.setItem('userLng', lng);
                        fetchIslamicData();
                    }
                },
                (err) => {
                    // Geolocation denied or failed - use saved city
                    console.log('Geolocation unavailable, using city:', currentCity);
                },
                { timeout: 8000, maximumAge: 600000 }
            );
        }

        // Request Notification Permission then detect location
        if ("Notification" in window) {
            Notification.requestPermission().then(() => detectLocation());
        } else {
            detectLocation();
        }

        function enableAudio() {
            audioPlayer.play().then(() => {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                audioEnabled = true;
                document.getElementById('audio-perm-btn').style.display = 'none';
                alert("✅ دەنگ چالاک کرا");
            }).catch(e => console.log("User interaction required"));
        }

        document.addEventListener('click', () => {
            if(!audioEnabled) document.getElementById('audio-perm-btn').style.display = 'block';
        }, {once:true});

        // ==========================================
        // 2. Settings Functions
        // ==========================================
        function changeAdhanSound() {
            const selected = document.getElementById('audio-select').value;
            currentSound = selected;
            localStorage.setItem('selectedSound', selected);
            audioPlayer.src = adhanSounds[selected];
            if(audioEnabled) {
                audioPlayer.play();
                setTimeout(() => { audioPlayer.pause(); audioPlayer.currentTime=0; }, 3000);
            }
        }

        function changeVolume() {
            const vol = document.getElementById('volume-control').value;
            savedVolume = vol;
            localStorage.setItem('adhanVolume', vol);
            audioPlayer.volume = vol;
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('mute-btn');
            if(isMuted) {
                btn.innerText = "🔕";
                btn.style.opacity = "0.5";
            } else {
                btn.innerText = "🔔";
                btn.style.opacity = "1";
            }
        }

        function changeTimeFormat() {
            timeFormat = document.getElementById('format-select').value;
            localStorage.setItem('timeFormat', timeFormat);
            renderPrayers();
        }

        // Helper to format 24h to 12h
        function formatTime(time24) {
            if (timeFormat === '24') return time24;
            
            let [hours, minutes] = time24.split(':');
            hours = parseInt(hours);
            
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            
            return `${hours}:${minutes} ${ampm}`;
        }

        // ==========================================
        // 3. API & Data Logic
        // ==========================================
        let todayPrayers = {};

        async function fetchIslamicData() {
            const cityContainer = document.getElementById('prayer-container');
            cityContainer.innerHTML = "<div style='color:#888;'>جاری هێنانە...</div>";
            
            try {
                let url;
                // Prefer coordinates if available (more accurate)
                if (currentLat && currentLng) {
                    url = `https://api.aladhan.com/v1/timings?latitude=${currentLat}&longitude=${currentLng}&method=3`;
                } else {
                    url = `https://api.aladhan.com/v1/timingsByCity?city=${currentCity}&country=Iraq&method=3`;
                }

                const response = await fetch(url);
                const data = await response.json();
                
                if(data.code === 200) {
                    const timings = data.data.timings;
                    const date = data.data.date;

                    document.getElementById('gregorian-date').innerText = date.gregorian.date;
                    document.getElementById('hijri-date').innerText = `${date.hijri.day} ${date.hijri.month.en}`;

                    todayPrayers = {
                        'Fajr': timings.Fajr.split(' ')[0],
                        'Sunrise': timings.Sunrise.split(' ')[0],
                        'Dhuhr': timings.Dhuhr.split(' ')[0],
                        'Asr': timings.Asr.split(' ')[0],
                        'Maghrib': timings.Maghrib.split(' ')[0],
                        'Isha': timings.Isha.split(' ')[0]
                    };

                    renderPrayers();

                    // Send updated prayer times to Service Worker for background scheduling
                    sendPrayersToSW(todayPrayers);
                }
            } catch (error) {
                cityContainer.innerHTML = "<div style='color:red;'>کێشە لە پەیوەندی هەیە!</div>";
            }
        }

        function renderPrayers() {
            const cityContainer = document.getElementById('prayer-container');
            const prayersDisplay = [
                { key: 'Fajr', name: 'بەیانی' },
                { key: 'Sunrise', name: 'خۆرھەڵاتن' },
                { key: 'Dhuhr', name: 'نیوەڕۆ' },
                { key: 'Asr', name: 'عەسر' },
                { key: 'Maghrib', name: 'مەغریب' },
                { key: 'Isha', name: 'عیشا' }
            ];

            let html = '';
            prayersDisplay.forEach(p => {
                let displayTime = formatTime(todayPrayers[p.key]);
                
                html += `
                    <div class="prayer-card" id="card-${p.key}">
                        <span class="prayer-name">${p.name}</span>
                        <span class="prayer-time" dir="ltr">${displayTime}</span>
                    </div>
                `;
            });
            cityContainer.innerHTML = html;
        }

        function changeCity() {
            currentCity = document.getElementById('city-select').value;
            // When user manually picks a city, clear coordinates so city is used
            currentLat = null;
            currentLng = null;
            localStorage.removeItem('userLat');
            localStorage.removeItem('userLng');
            localStorage.setItem('selectedCity', currentCity);
            document.getElementById('prayer-container').innerHTML = "جاری گۆڕین...";
            fetchIslamicData();
        }

        // ==========================================
        // 4. Time Check & Trigger Logic
        // ==========================================
        let lastPlayedTime = "";

        function checkTimeLoop() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const currentTime = `${hours}:${minutes}`;
            
            // Highlight active prayer card
            document.querySelectorAll('.prayer-card').forEach(c => c.classList.remove('active-prayer'));

            for (const [key, time] of Object.entries(todayPrayers)) {
                if (currentTime === time) {
                    const card = document.getElementById(`card-${key}`);
                    if(card) card.classList.add('active-prayer');
                }

                if (currentTime === time && key !== 'Sunrise') {
                    if (lastPlayedTime !== currentTime) {
                        triggerAdhan(key, false);
                        lastPlayedTime = currentTime;
                    }
                }
            }
        }

        function triggerAdhan(prayerKey, fromBackground) {
            const nameMap = {'Fajr':'بەیانی', 'Dhuhr':'نیوەڕۆ', 'Asr':'عەسر', 'Maghrib':'مەغریب', 'Isha':'عیشا'};
            const prayerName = nameMap[prayerKey];

            // 1. Show Visual Alert
            const alertBox = document.getElementById('adhan-alert');
            document.getElementById('current-prayer-name').innerText = prayerName;
            alertBox.style.display = 'block';

            // 2. Play Audio (only if page is visible or triggered from background message)
            if (!isMuted) {
                audioPlayer.currentTime = 0;
                audioPlayer.play().catch(e => document.getElementById('audio-perm-btn').style.display = 'block');
            }

            // 3. Send Notification (only if page is visible; SW handles it when in background)
            if (!fromBackground && Notification.permission === "granted") {
                new Notification("کاتەکانی بانگ", {
                    body: `بانگی ${prayerName} - الله أكبر`,
                    icon: "https://cdn-icons-png.flaticon.com/512/2884/2884657.png"
                });
            }

            // Hide alert after 5 mins
            setTimeout(() => {
                alertBox.style.display = 'none';
                if(!isMuted) audioPlayer.pause();
            }, 300000);
        }

        // Re-schedule SW when SW becomes active (page reload after SW install)
        navigator.serviceWorker && navigator.serviceWorker.ready.then(() => {
            if (Object.keys(todayPrayers).length > 0) sendPrayersToSW(todayPrayers);
        });

        // Start Loop
        setInterval(checkTimeLoop, 1000);
        fetchIslamicData();

    </script>
</body>
</html>
