name: Build APK and IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest # پێویستە بۆ درووستکردنی IPA ی ئایفۆن

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    # درووستکردنی لۆگۆی ئەپەکە پێش بەڵد کردن
    - name: Generate App Icons
      run: flutter pub run flutter_launcher_icons:main

    - name: Build APK (Android)
      run: flutter build apk --release

    - name: Build iOS (IPA)
      run: flutter build ios --no-codesign # بۆ ئەوەی بێ ئەکاونتی پۆڵی ئەپڵ درووستی بکات

    # لێرەدا فایلەکان پاشەکەوت دەبن و دەتوانیت دایانبەزێنیت
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload iOS Payload
      uses: actions/upload-artifact@v3
      with:
        name: ios-ipa
        path: build/ios/iphoneos/Runner.app
