<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کتێبخانەی گشتگیری ئیسلامی</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #00796b;
            --history-color: #f39c12;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            background: white;
            padding: 50px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .header-btns {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            transition: 0.3s;
        }

        .home-btn { background-color: var(--secondary-color); }
        .home-btn:hover { background-color: #004d40; }

        .history-btn { background-color: var(--history-color); }
        .history-btn:hover { background-color: #d35400; }

        #history-panel {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            width: 300px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-item:hover { background-color: #f9f9f9; }

        .history-query { font-weight: bold; color: var(--primary-color); }
        .history-time { font-size: 12px; color: #888; display: block; margin-top: 3px; }
        
        .clear-history {
            width: 100%;
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }

        h1 { color: var(--primary-color); margin: 0; }

        .search-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            padding: 12px;
            width: 50%;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary-color); }

        button.search-btn {
            padding: 12px 25px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button.search-btn:hover { background-color: #1b5e20; }

        /* Source Tabs */
        .source-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 15px 0 0 0;
            flex-wrap: wrap;
        }

        .source-tab {
            padding: 6px 16px;
            border: 2px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            background: white;
            transition: 0.2s;
            font-family: inherit;
        }

        .source-tab.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        #books-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        .book-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .book-card:hover { transform: translateY(-5px); }

        .book-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #eee;
        }

        .book-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }

        .book-title {
            font-weight: bold; margin-bottom: 5px; font-size: 1.1em;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .book-author { color: #666; font-size: 0.9em; margin-bottom: 15px; }

        .book-source-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .tag-openlibrary { background: #e8f5e9; color: #2e7d32; }
        .tag-google { background: #e3f2fd; color: #1565c0; }
        .tag-archive { background: #fff3e0; color: #e65100; }

        .read-btn {
            margin-top: auto; display: block; text-align: center;
            background-color: #0288d1; color: white; text-decoration: none; padding: 10px; border-radius: 5px;
        }

        .loading-status { text-align: center; padding: 20px; font-weight: bold; color: var(--primary-color); }

        .results-info {
            text-align: center;
            padding: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-btns">
            <button onclick="goHome()" class="btn home-btn">🏠 سەرەکی</button>
            <button onclick="toggleHistory()" class="btn history-btn">📜 مێژوو</button>
        </div>

        <div id="history-panel">
            <h4 style="margin-top:0;">مێژووی گەڕانەکان</h4>
            <div id="history-list"></div>
            <button onclick="clearHistory()" class="clear-history">🗑️ سڕینەوەی مێژوو</button>
        </div>

        <h1>📚 کتێبخانەی گشتگیری ئیسلامی</h1>
        <p>گەڕان و خوێندنەوەی هەموو کتێبە ئیسلامییەکان</p>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ناوی کتێب یان بابەتی دڵخواز بنووسە...">
            <button class="search-btn" onclick="initiateSearch()">بگەڕێ</button>
        </div>

        <div class="source-tabs">
            <button class="source-tab active" onclick="setSource('all')" id="tab-all">🌐 هەموو سەرچاوەکان</button>
            <button class="source-tab" onclick="setSource('openlibrary')" id="tab-openlibrary">📗 Open Library</button>
            <button class="source-tab" onclick="setSource('google')" id="tab-google">📘 Google Books</button>
            <button class="source-tab" onclick="setSource('archive')" id="tab-archive">🏛️ Archive.org</button>
        </div>
    </header>

    <div id="results-info" class="results-info"></div>
    <div id="books-container"></div>
    <div id="loading" class="loading-status">خەریکە کتێبەکان باردەکرێن...</div>

    <script>
        // ==========================================
        // State
        // ==========================================
        let currentQuery = 'islam';
        let currentSource = 'all';
        let isLoading = false;

        // Pagination state per source
        let pageState = {
            openlibrary: { page: 1, done: false },
            google: { startIndex: 0, done: false },
            archive: { page: 1, done: false }
        };

        // ==========================================
        // Default Islamic keyword searches
        // ==========================================
        const defaultQueries = [
            'quran', 'hadith', 'fiqh', 'islam', 'sunnah',
            'tafsir', 'aqeedah', 'seerah', 'prophet muhammad',
            'islamic jurisprudence', 'muslim', 'arabic calligraphy'
        ];

        // ==========================================
        // Source Selection
        // ==========================================
        function setSource(source) {
            currentSource = source;
            document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + source).classList.add('active');
            initiateSearch(true);
        }

        // ==========================================
        // Main Search Trigger
        // ==========================================
        function initiateSearch(keepQuery = false) {
            const input = document.getElementById('searchInput').value.trim();
            if (input) {
                currentQuery = input;
                saveToHistory(input);
            } else if (!keepQuery) {
                currentQuery = 'islam';
            }

            // Reset pagination
            pageState = {
                openlibrary: { page: 1, done: false },
                google: { startIndex: 0, done: false },
                archive: { page: 1, done: false }
            };

            document.getElementById('books-container').innerHTML = '';
            document.getElementById('results-info').innerText = '';
            loadBooks();
        }

        // ==========================================
        // Load Books (dispatcher)
        // ==========================================
        async function loadBooks() {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loading').style.display = 'block';

            try {
                if (currentSource === 'all') {
                    // Load from all three simultaneously
                    await Promise.all([
                        loadFromOpenLibrary(),
                        loadFromGoogle(),
                        loadFromArchive()
                    ]);
                } else if (currentSource === 'openlibrary') {
                    await loadFromOpenLibrary();
                } else if (currentSource === 'google') {
                    await loadFromGoogle();
                } else if (currentSource === 'archive') {
                    await loadFromArchive();
                }
            } catch (e) {
                console.error(e);
            }

            document.getElementById('loading').style.display = 'none';
            isLoading = false;
        }

        // ==========================================
        // Open Library API
        // ==========================================
        async function loadFromOpenLibrary() {
            if (pageState.openlibrary.done) return;
            try {
                const q = encodeURIComponent(currentQuery + ' islam');
                const page = pageState.openlibrary.page;
                const url = `https://openlibrary.org/search.json?q=${q}&page=${page}&limit=20&language=ara,eng,urd,tur,fas`;

                const res = await fetch(url);
                const data = await res.json();

                if (!data.docs || data.docs.length === 0) {
                    pageState.openlibrary.done = true;
                    return;
                }

                pageState.openlibrary.page++;

                data.docs.forEach(book => {
                    if (!book.title) return;
                    const coverId = book.cover_i;
                    const imgUrl = coverId
                        ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg`
                        : 'https://via.placeholder.com/128x195?text=No+Cover';
                    const authors = book.author_name ? book.author_name.join(', ') : 'نووسەر نادیارە';
                    const link = book.key ? `https://openlibrary.org${book.key}` : '#';

                    appendCard({
                        title: book.title,
                        authors,
                        imgUrl,
                        link,
                        source: 'openlibrary',
                        sourceLabel: 'Open Library'
                    });
                });

                updateResultsInfo();
            } catch (e) {
                console.error('OpenLibrary error:', e);
            }
        }

        // ==========================================
        // Google Books API
        // ==========================================
        async function loadFromGoogle() {
            if (pageState.google.done) return;
            try {
                const q = encodeURIComponent(`${currentQuery} islam`);
                const si = pageState.google.startIndex;
                const url = `https://www.googleapis.com/books/v1/volumes?q=${q}&startIndex=${si}&maxResults=20&printType=books&filter=free-ebooks`;

                const res = await fetch(url);
                const data = await res.json();

                if (!data.items || data.items.length === 0) {
                    // Try without free filter
                    const url2 = `https://www.googleapis.com/books/v1/volumes?q=${q}&startIndex=${si}&maxResults=20&printType=books`;
                    const res2 = await fetch(url2);
                    const data2 = await res2.json();

                    if (!data2.items) { pageState.google.done = true; return; }

                    data2.items.forEach(book => renderGoogleBook(book));
                    pageState.google.startIndex += 20;
                } else {
                    data.items.forEach(book => renderGoogleBook(book));
                    pageState.google.startIndex += 20;
                }

                updateResultsInfo();
            } catch (e) {
                console.error('Google Books error:', e);
            }
        }

        function renderGoogleBook(book) {
            const info = book.volumeInfo;
            const title = info.title || "بێ ناونیشان";
            const authors = info.authors ? info.authors.join(', ') : "نووسەر نادیارە";
            const imgUrl = info.imageLinks
                ? (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail)
                : 'https://via.placeholder.com/128x195?text=No+Cover';
            const link = info.previewLink || info.infoLink || '#';

            appendCard({ title, authors, imgUrl, link, source: 'google', sourceLabel: 'Google Books' });
        }

        // ==========================================
        // Internet Archive API
        // ==========================================
        async function loadFromArchive() {
            if (pageState.archive.done) return;
            try {
                const q = encodeURIComponent(`(${currentQuery}) AND (subject:islam OR subject:quran OR subject:hadith)`);
                const page = pageState.archive.page;
                const url = `https://archive.org/advancedsearch.php?q=${q}&fl[]=identifier,title,creator,subject,mediatype&rows=20&page=${page}&output=json&mediatype=texts`;

                const res = await fetch(url);
                const data = await res.json();
                const docs = data?.response?.docs;

                if (!docs || docs.length === 0) {
                    pageState.archive.done = true;
                    return;
                }

                pageState.archive.page++;

                docs.forEach(item => {
                    if (!item.title) return;
                    const id = item.identifier;
                    const imgUrl = `https://archive.org/services/img/${id}`;
                    const link = `https://archive.org/details/${id}`;
                    const authors = Array.isArray(item.creator)
                        ? item.creator.join(', ')
                        : (item.creator || 'نووسەر نادیارە');

                    appendCard({
                        title: Array.isArray(item.title) ? item.title[0] : item.title,
                        authors,
                        imgUrl,
                        link,
                        source: 'archive',
                        sourceLabel: 'Archive.org'
                    });
                });

                updateResultsInfo();
            } catch (e) {
                console.error('Archive error:', e);
            }
        }

        // ==========================================
        // Render Card
        // ==========================================
        function appendCard({ title, authors, imgUrl, link, source, sourceLabel }) {
            const container = document.getElementById('books-container');
            const div = document.createElement('div');
            div.className = 'book-card';
            div.innerHTML = `
                <img src="${imgUrl}" alt="${title}" class="book-img" onerror="this.src='https://via.placeholder.com/128x195?text=No+Cover'">
                <div class="book-info">
                    <span class="book-source-tag tag-${source}">${sourceLabel}</span>
                    <div class="book-title" title="${title}">${title}</div>
                    <div class="book-author">${authors}</div>
                    <a href="${link}" target="_blank" class="read-btn">📖 خوێندنەوە</a>
                </div>
            `;
            container.appendChild(div);
        }

        function updateResultsInfo() {
            const count = document.getElementById('books-container').children.length;
            document.getElementById('results-info').innerText = `${count} کتێب دۆزرایەوە`;
        }

        // ==========================================
        // History
        // ==========================================
        function saveToHistory(query) {
            let history = JSON.parse(localStorage.getItem('islamicLibHistory')) || [];
            const now = new Date();
            const timeString = now.toLocaleDateString('ku-IQ') + ' - ' + now.toLocaleTimeString('ku-IQ');
            history.unshift({ text: query, time: timeString });
            if (history.length > 20) history.pop();
            localStorage.setItem('islamicLibHistory', JSON.stringify(history));
        }

        function toggleHistory() {
            const panel = document.getElementById('history-panel');
            const listDiv = document.getElementById('history-list');
            
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'block';
                listDiv.innerHTML = '';
                
                let history = JSON.parse(localStorage.getItem('islamicLibHistory')) || [];

                if (history.length === 0) {
                    listDiv.innerHTML = '<p style="font-size:12px; color:#666;">هیچ مێژوویەک نییە.</p>';
                    return;
                }

                history.forEach(item => {
                    const d = document.createElement('div');
                    d.className = 'history-item';
                    d.onclick = () => searchHistoryItem(item.text);
                    d.innerHTML = `
                        <div class="history-query">🔍 ${item.text}</div>
                        <span class="history-time">${item.time}</span>
                    `;
                    listDiv.appendChild(d);
                });
            }
        }

        function searchHistoryItem(text) {
            document.getElementById('searchInput').value = text;
            currentQuery = text;
            document.getElementById('history-panel').style.display = 'none';
            initiateSearch(true);
        }

        function clearHistory() {
            if (confirm("دڵنیایت دەتەوێت مێژووی گەڕانەکانت بسڕیتەوە؟")) {
                localStorage.removeItem('islamicLibHistory');
                document.getElementById('history-panel').style.display = 'none';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }

        // ==========================================
        // Infinite Scroll
        // ==========================================
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                if (!isLoading) loadBooks();
            }
        });

        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") initiateSearch();
        });

        // ==========================================
        // Init - load default islamic books
        // ==========================================
        loadBooks();
    </script>

</body>
</html>
